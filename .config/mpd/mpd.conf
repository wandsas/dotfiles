#
# -*- Base settings -*-
#
music_directory         "~/music"
playlist_directory      "~/.local/var/mpd/playlists"
db_file                 "~/.local/var/mpd/database"
log_file                "~/.local/var/mpd/log"
pid_file                "~/.local/var/mpd/pid"
state_file              "~/.local/var/mpd/state"
# sticker_file            "~/.local/var/mpd/sticker.sql"

# gapless_mp3_playback    "yes"
restore_paused          "yes"
# save_absolute_paths_in_playlists "no"
# metadata_to_use         "artist,composer,performer,albumartist,album,title,disc,track,name,genre,date"
auto_update             "yes"
auto_update_depth       "1"

follow_outside_symlinks "yes"
follow_inside_symlinks  "yes"

# zeroconf_name "Music Player Daemon"

#
# -*- Advanced settings -*-
#
#audio_output_format    "44100:16:2
#samplerate_converter   "Fastest Sinc Interpolator"
#replaygain             "album"
#replaygain_preamp 	    "0"
#volume_normalization   "no"
audio_buffer_size       "2048"
# buffer_before_play      "10%"

connection_timeout      "60"
max_connections         "10"
max_playlist_length     "16384"
max_command_list_size   "2048"
max_output_buffer_size  "8192"

filesystem_charset      "UTF-8"
# id3v1_encoding          "ISO-8859-1"

#bind_to_address         /var/lib/mpd/socket

bind_to_address         "127.0.0.1"
#bind_to_address         10.0.6.10

#port                    "6600"

log_level               "default"

#
# -*- user/group -*-
#
user                    "wandsas"
# group                 "audio"

#
# -*- permissions -*-
#
password                        "hackme@read,add,control,admin"
#default_permissions             "read,add,control,admin"

#
# -*- Input -*-
#
input {
    plugin "curl"
    # proxy "proxy.isp.com:8080
    # proxy_user "user"
    # proxy_password "password"
}

# See <http://mpd.wikia.com/wiki/Configuration#Audio_Outputs>
# for examples of other audio outputs.

#
# -*- ALSA Output -*-
#
audio_output {
	type   "alsa"
	name   "hda-pch"
	device "pch"
}
audio_output {
	type   "alsa"
	name   "hda-cmi"
	device "cmi"
}
audio_output {
	type   "alsa"
	name   "alsa-default"
	device "default"
}
audio_output {
	type   "alsa"
	name   "loop-zita"
	device "pzlp"
}
audio_output {
	type   "alsa"
	name   "alsa-jack"
	device "jack"
}
audio_output {
	type   "alsa"
	name   "alsa-dmixer"
	device "dmixer"
}
audio_output {
	type   "alsa"
	name   "alsa-bs2b"
	device "bs2b"
}
#
# -*- JACK -*-
#
audio_output {
	type   "jack"
	name   "jack"
}
