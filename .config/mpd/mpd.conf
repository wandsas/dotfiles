#
# -*- Visualizer -*-
#
audio_output {
    name "Visualizer FIFO"
    type "fifo"
    path "/tmp/mpd_visualizer.fifo"
    format "44100:16:2"
    auto_resample "no"
    use_mmap "yes"
}

# This setting will change all decoded audio to be converted to the specified
